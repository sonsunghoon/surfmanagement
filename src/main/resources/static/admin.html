<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurfBook — 관리자</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ═══════════════════ LOGIN VIEW ═══════════════════ -->
<div id="login-view" class="login-page hidden">
    <div class="login-box">
        <div class="login-logo">
            <div class="logo-mark">🌊</div>
            <h1>SurfBook</h1>
            <p>서핑샵 관리자</p>
        </div>

        <div class="tabs mb-16">
            <button class="tab-btn active" id="tab-btn-login" onclick="switchAdminTab('login')">로그인</button>
            <button class="tab-btn" id="tab-btn-register" onclick="switchAdminTab('register')">샵 등록</button>
        </div>

        <!-- 로그인 폼 -->
        <div id="admin-login-section">
            <div id="login-error" class="alert alert-danger hidden"></div>
            <form id="login-form" novalidate>
                <div class="form-group">
                    <label class="form-label" for="admin-email">이메일</label>
                    <input type="email" id="admin-email" class="form-control" placeholder="admin@surfshop.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="admin-password">비밀번호</label>
                    <input type="password" id="admin-password" class="form-control" placeholder="비밀번호 입력" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block mt-16" id="btn-login">로그인</button>
            </form>
        </div>

        <!-- 샵 등록 폼 -->
        <div id="admin-register-section" class="hidden">
            <div id="admin-reg-error" class="alert alert-danger hidden"></div>
            <form id="admin-reg-form" novalidate>
                <div class="form-group">
                    <label class="form-label" for="ar-shop-name">서핑샵 이름 <span class="required">*</span></label>
                    <input type="text" id="ar-shop-name" class="form-control" placeholder="예) 양양 서핑클럽" maxlength="50" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="ar-shop-location">서핑샵 위치 <span class="required">*</span></label>
                    <input type="text" id="ar-shop-location" class="form-control" placeholder="예) 강원도 양양군 현남면" maxlength="100" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="ar-shop-desc">샵 소개 <span style="color:var(--gray-400);font-weight:400">(선택)</span></label>
                    <input type="text" id="ar-shop-desc" class="form-control" placeholder="한 줄 소개" maxlength="200">
                </div>
                <div style="height:1px;background:var(--line-soft);margin:16px 0"></div>
                <div class="form-group">
                    <label class="form-label" for="ar-email">관리자 이메일 <span class="required">*</span></label>
                    <input type="email" id="ar-email" class="form-control" placeholder="admin@myshop.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="ar-password">비밀번호 <span class="required">*</span></label>
                    <input type="password" id="ar-password" class="form-control" placeholder="8자 이상" minlength="8" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="ar-password2">비밀번호 확인 <span class="required">*</span></label>
                    <input type="password" id="ar-password2" class="form-control" placeholder="비밀번호 재입력" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block mt-16" id="btn-admin-reg">서핑샵 개설하기</button>
            </form>
        </div>
    </div>
</div>

<!-- ═══════════════════ DASHBOARD VIEW ═══════════════════ -->
<div id="dashboard-view" class="admin-layout hidden">
    <header class="app-header">
        <div class="logo"><span class="wave-icon">🌊</span> SurfBook</div>
        <div class="header-right" style="display:flex;align-items:center;gap:12px">
            <span id="header-shop" style="font-weight:600"></span>
            <span id="header-email" style="opacity:0.75"></span>
            <button class="btn btn-ghost btn-sm" id="btn-notifications" title="알림" onclick="toggleNotifPanel()" style="position:relative;color:#fff">🔔<span id="notif-badge" class="hidden" style="position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;border-radius:999px;font-size:10px;font-weight:700;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px"></span></button>
            <button class="btn btn-ghost btn-sm" id="btn-refresh" title="새로고침" style="color:#fff">↺</button>
            <button class="btn btn-ghost btn-sm" id="btn-logout" style="color:#fff">로그아웃</button>
        </div>
    </header>

    <div class="admin-shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <span class="wave-icon">🌊</span>
          <div>
            <div class="sidebar-title">SurfBook <small style="font-weight:400;opacity:0.45;font-size:11px">· admin</small></div>
          </div>
        </div>

        <div class="sidebar-section-label">운영</div>
        <nav class="sidebar-nav">
          <button class="sidebar-link active" data-tab="members" onclick="switchTab('members')">
            <span class="sidebar-ic">📊</span>대시보드
          </button>
          <button class="sidebar-link" data-tab="members" onclick="switchTab('members')">
            <span class="sidebar-ic">👥</span>회원 관리
            <span class="sidebar-badge" id="sidebar-badge-pending"></span>
          </button>
          <button class="sidebar-link" data-tab="lessons" onclick="switchTab('lessons')">
            <span class="sidebar-ic">🌊</span>수업 관리
          </button>
        </nav>

        <div class="sidebar-section-label">관리</div>
        <nav class="sidebar-nav">
          <button class="sidebar-link" data-tab="expiry" onclick="switchTab('expiry')">
            <span class="sidebar-ic">🎫</span>회원권 만료
          </button>
          <button class="sidebar-link" onclick="toggleNotifPanel()">
            <span class="sidebar-ic">🔔</span>알림 로그
          </button>
        </nav>

        <div class="sidebar-user">
          <div class="sidebar-user-ava" id="sidebar-ava">SB</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="sidebar-shop-name">양양 서핑클럽</div>
            <div class="sidebar-user-email" id="sidebar-user-email"></div>
          </div>
        </div>
      </aside>

      <main class="main-area">
        <div class="topbar">
          <div class="topbar-search">
            <button class="btn btn-ghost btn-sm">🔍 검색</button>
          </div>
        </div>

        <!-- 알림 패널 -->
        <div id="notif-panel" class="hidden" style="position:fixed;top:60px;right:16px;width:340px;max-height:480px;background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.15);z-index:1000;display:flex;flex-direction:column;overflow:hidden">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line-soft)">
                <span style="font-weight:700;font-size:15px">알림</span>
                <button class="btn btn-ghost btn-sm" onclick="markAllNotifRead()">모두 읽음</button>
            </div>
            <div id="notif-list" style="overflow-y:auto;flex:1"></div>
        </div>

        <div class="admin-content">
          <div class="dashboard-welcome">
            <div>
              <h2 class="dashboard-title">안녕하세요, <span id="dashboard-shop-name"></span> 서핑클럽 👋</h2>
              <p class="dashboard-subtitle">2026년 5월 17일 일요일 · 오늘 양양은 1.2m 사이드 오프쇼어 컨디션입니다.</p>
            </div>
            <button class="btn btn-primary btn-sm" onclick="switchTab('lessons')">오늘 수업 관리</button>
          </div>

          <div class="stats-grid stats-grid-4 mt-4">
            <div class="stat-card accent">
              <div class="stat-value" id="stat-pending">-</div>
              <div class="stat-label">🔥 즉시 조치 필요</div>
              <div class="stat-delta" id="stat-pending-delta">신청 대기 · D-7 만료</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-approved">-</div>
              <div class="stat-label">활성 회원</div>
              <div class="stat-delta up" id="stat-approved-delta">승인 완료</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-lessons">-</div>
              <div class="stat-label">오늘 수업</div>
              <div class="stat-delta" id="stat-lessons-delta">예정 수업</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-week-participants">-</div>
              <div class="stat-label">이번 주 참가 인원</div>
              <div class="stat-delta">월요일부터 오늘까지</div>
            </div>
          </div>

          <div class="tabs">
            <button class="tab-btn active" data-tab="members" onclick="switchTab('members')">회원 관리</button>
            <button class="tab-btn" data-tab="lessons" onclick="switchTab('lessons')">수업 관리</button>
            <button class="tab-btn" data-tab="expiry" onclick="switchTab('expiry')">회원권 만료</button>
          </div>

        <!-- ── 회원 관리 탭 ── -->
        <div id="tab-members">
            <div class="filter-bar">
                <button class="filter-chip active" data-filter="ALL">전체</button>
                <button class="filter-chip" data-filter="PENDING">대기중</button>
                <button class="filter-chip" data-filter="APPROVED">승인</button>
                <button class="filter-chip" data-filter="REJECTED">반려</button>
            </div>
            <div class="card">
                <div id="member-list"><div class="text-center mt-16"><span class="spinner dark"></span></div></div>
            </div>
        </div>

        <!-- ── 회원권 만료 탭 ── -->
        <div id="tab-expiry" class="hidden">
            <div id="expiry-dashboard-content">
                <div class="text-center mt-16"><span class="spinner dark"></span></div>
            </div>
        </div>

        <!-- ── 수업 관리 탭 ── -->
        <div id="tab-lessons" class="hidden">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px; gap:10px; flex-wrap:wrap;">
                <p class="section-subtitle" style="margin:0">등록된 수업 목록입니다.</p>
                <div style="display:flex;gap:8px">
                    <button class="btn btn-danger btn-sm" id="btn-delete-lessons" disabled>수업 삭제</button>
                    <button class="btn btn-primary btn-sm" id="btn-create-lesson">수업 만들기</button>
                </div>
            </div>
            <div id="lesson-list"><div class="text-center mt-16"><span class="spinner dark"></span></div></div>
        </div>
      </main>
    </div>
</div>

<!-- ═══════════════════ 회원권 모달 ═══════════════════ -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span id="modal-title">회원권</span>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modal-body">
            <div class="text-center"><span class="spinner dark"></span></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" id="btn-assign-ms">저장</button>
        </div>
    </div>
</div>

<!-- ═══════════════════ 키핑권 모달 ═══════════════════ -->
<div id="keeping-modal-overlay" class="modal-overlay hidden" onclick="closeKeepingModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span id="keeping-modal-title">키핑권</span>
            <button class="modal-close" onclick="closeKeepingModal()">✕</button>
        </div>
        <div class="modal-body" id="keeping-modal-body">
            <div class="text-center"><span class="spinner dark"></span></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeKeepingModal()">취소</button>
            <button class="btn btn-primary" id="btn-save-keeping">등록</button>
        </div>
    </div>
</div>

<!-- ═══════════════════ 수업 생성 모달 ═══════════════════ -->
<div id="lesson-modal-overlay" class="modal-overlay hidden" onclick="closeLessonModal()">
    <div class="modal-box modal-box-lg" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span>수업 생성</span>
            <button class="modal-close" onclick="closeLessonModal()">✕</button>
        </div>
        <div class="modal-body">
            <div id="lesson-modal-alert" class="alert alert-danger hidden"></div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">수업명 <span class="required">*</span></label>
                    <input type="text" id="ls-title" class="form-control" placeholder="예: 입문자 그룹 레슨">
                </div>
                <div class="form-group">
                    <label class="form-label">강사</label>
                    <input type="text" id="ls-instructor" class="form-control" placeholder="강사 이름">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">날짜 <span class="required">*</span></label>
                    <input type="date" id="ls-date" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">수업 유형 <span class="required">*</span></label>
                    <select id="ls-type" class="form-select">
                        <option value="GROUP">그룹</option>
                        <option value="PRIVATE">1:1 개인</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">시작 시간 <span class="required">*</span></label>
                    <input type="time" id="ls-start" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">종료 시간 <span class="required">*</span></label>
                    <input type="time" id="ls-end" class="form-control">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">대상 레벨</label>
                    <select id="ls-level" class="form-select">
                        <option value="">제한 없음</option>
                        <option value="BEGINNER">입문자</option>
                        <option value="INTERMEDIATE">중급자</option>
                        <option value="ADVANCED">고급자</option>
                        <option value="EXPERT">전문가</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">보드 타입</label>
                    <select id="ls-board" class="form-select">
                        <option value="">제한 없음</option>
                        <option value="SHORTBOARD">숏보드</option>
                        <option value="LONGBOARD">롱보드</option>
                        <option value="FUNBOARD">펀보드</option>
                        <option value="SUP">SUP</option>
                        <option value="BODYBOARD">바디보드</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">파도 크기</label>
                    <input type="text" id="ls-wave-size" class="form-control" placeholder="예: 1.5m">
                </div>
                <div class="form-group">
                    <label class="form-label">피리어드</label>
                    <input type="text" id="ls-wave-period" class="form-control" placeholder="예: 12s">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">바람</label>
                    <input type="text" id="ls-wind" class="form-control" placeholder="예: NW 10m/s">
                </div>
                <div class="form-group">
                    <label class="form-label">정원 <span class="required">*</span></label>
                    <input type="number" id="ls-capacity" class="form-control" placeholder="인원 수" min="1" value="8">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeLessonModal()">취소</button>
            <button class="btn btn-primary" id="btn-save-lesson">수업 생성</button>
        </div>
    </div>
</div>

<!-- ═══════════════════ 수업 상세 모달 ═══════════════════ -->
<div id="lesson-detail-overlay" class="modal-overlay hidden" onclick="closeLessonDetail()">
    <div class="modal-box modal-box-lg" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span id="lesson-detail-title">수업 상세</span>
            <button class="modal-close" onclick="closeLessonDetail()">✕</button>
        </div>
        <div class="modal-body" id="lesson-detail-body">
            <div class="text-center"><span class="spinner dark"></span></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeLessonDetail()">닫기</button>
        </div>
    </div>
</div>

<!-- ═══════════════════ 회원 알림 보내기 모달 ═══════════════════ -->
<div id="member-notif-modal-overlay" class="modal-overlay hidden" onclick="closeMemberNotifModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span id="member-notif-modal-title">알림 보내기</span>
            <button class="modal-close" onclick="closeMemberNotifModal()">✕</button>
        </div>
        <div class="modal-body">
            <div id="member-notif-modal-alert" class="alert alert-danger hidden"></div>
            <div class="form-group">
                <label class="form-label">받는 회원</label>
                <div id="member-notif-target-name" style="font-weight:600;font-size:15px;padding:4px 0"></div>
            </div>
            <div class="form-group">
                <label class="form-label">메시지 <span class="required">*</span></label>
                <textarea id="member-notif-message" class="form-control" rows="4"
                    placeholder="회원에게 전달할 메시지를 입력하세요." style="resize:vertical"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeMemberNotifModal()">취소</button>
            <button class="btn btn-primary" id="btn-send-member-notif">보내기</button>
        </div>
    </div>
</div>

<script src="/js/constants.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
