<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurfBook — 관리자</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ═══════════════════ LOGIN VIEW ═══════════════════ -->
<div id="login-view" class="login-page hidden">
    <div class="login-box">
        <div class="login-logo">
            <div class="logo-mark">🌊</div>
            <h1>SurfBook</h1>
            <p>서핑샵 관리자 로그인</p>
        </div>
        <div id="login-error" class="alert alert-danger hidden"></div>
        <form id="login-form" novalidate>
            <div class="form-group">
                <label class="form-label" for="admin-email">이메일</label>
                <input type="email" id="admin-email" class="form-control" placeholder="admin@surfshop.com" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="admin-password">비밀번호</label>
                <input type="password" id="admin-password" class="form-control" placeholder="비밀번호 입력" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block mt-16" id="btn-login">로그인</button>
        </form>
        <div class="divider"></div>
        <p class="text-muted text-center">테스트 계정: admin@yangyang.com / admin123</p>
    </div>
</div>

<!-- ═══════════════════ DASHBOARD VIEW ═══════════════════ -->
<div id="dashboard-view" class="admin-layout hidden">
    <header class="app-header">
        <div class="logo"><span class="wave-icon">🌊</span> SurfBook</div>
        <div class="header-right">
            <span id="header-shop" style="font-weight:600"></span>
            <span id="header-email" style="opacity:0.75"></span>
            <!-- 알림 벨 -->
            <div class="notif-wrap" style="position:relative;display:inline-block">
                <button class="btn btn-ghost btn-sm" id="btn-notifications" style="color:white;opacity:0.9;font-size:18px" title="알림" onclick="toggleNotifPanel()">🔔</button>
                <span id="notif-badge" class="notif-badge hidden">0</span>
            </div>
            <button class="btn btn-ghost btn-sm" id="btn-refresh" style="color:white;opacity:0.9" title="새로고침">↺</button>
            <button class="btn btn-ghost btn-sm" id="btn-logout" style="color:white;opacity:0.9">로그아웃</button>
        </div>
    </header>

    <!-- 알림 패널 -->
    <div id="notif-panel" class="notif-panel hidden">
        <div class="notif-panel-header">
            <span style="font-weight:700;font-size:15px">알림</span>
            <button class="btn btn-outline btn-sm" onclick="markAllNotifRead()" style="font-size:12px">전체 읽음</button>
        </div>
        <div id="notif-list" style="max-height:360px;overflow-y:auto">
            <div class="text-center" style="padding:20px"><span class="spinner dark"></span></div>
        </div>
    </div>

    <div class="admin-content">
        <div class="stats-grid mt-4">
            <div class="stat-card"><div class="stat-value" id="stat-pending">-</div><div class="stat-label">신청 대기</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-approved">-</div><div class="stat-label">승인 회원</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-lessons">-</div><div class="stat-label">오늘 수업</div></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="members">회원 관리</button>
            <button class="tab-btn" data-tab="lessons">수업 관리</button>
            <button class="tab-btn" data-tab="expiry">회원권 만료</button>
        </div>

        <!-- ── 회원 관리 탭 ── -->
        <div id="tab-members">
            <div class="filter-bar">
                <button class="filter-chip active" data-filter="ALL">전체</button>
                <button class="filter-chip" data-filter="PENDING">대기중</button>
                <button class="filter-chip" data-filter="APPROVED">승인</button>
                <button class="filter-chip" data-filter="REJECTED">반려</button>
            </div>
            <div class="card">
                <div id="member-list"><div class="text-center mt-16"><span class="spinner dark"></span></div></div>
            </div>
        </div>

        <!-- ── 회원권 만료 탭 ── -->
        <div id="tab-expiry" class="hidden">
            <div id="expiry-dashboard-content">
                <div class="text-center mt-16"><span class="spinner dark"></span></div>
            </div>
        </div>

        <!-- ── 수업 관리 탭 ── -->
        <div id="tab-lessons" class="hidden">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
                <p class="section-subtitle" style="margin:0">등록된 수업 목록입니다.</p>
                <div style="display:flex;gap:8px">
                    <button class="btn btn-danger btn-sm" id="btn-delete-lessons" disabled>수업 삭제</button>
                    <button class="btn btn-primary btn-sm" id="btn-create-lesson">+ 수업 생성</button>
                </div>
            </div>
            <div id="lesson-list"><div class="text-center mt-16"><span class="spinner dark"></span></div></div>
        </div>
    </div>
</div>

<!-- ═══════════════════ 회원권 모달 ═══════════════════ -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span id="modal-title">회원권</span>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modal-body">
            <div class="text-center"><span class="spinner dark"></span></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" id="btn-assign-ms">저장</button>
        </div>
    </div>
</div>

<!-- ═══════════════════ 키핑권 모달 ═══════════════════ -->
<div id="keeping-modal-overlay" class="modal-overlay hidden" onclick="closeKeepingModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span id="keeping-modal-title">키핑권</span>
            <button class="modal-close" onclick="closeKeepingModal()">✕</button>
        </div>
        <div class="modal-body" id="keeping-modal-body">
            <div class="text-center"><span class="spinner dark"></span></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeKeepingModal()">취소</button>
            <button class="btn btn-primary" id="btn-save-keeping">등록</button>
        </div>
    </div>
</div>

<!-- ═══════════════════ 수업 생성 모달 ═══════════════════ -->
<div id="lesson-modal-overlay" class="modal-overlay hidden" onclick="closeLessonModal()">
    <div class="modal-box modal-box-lg" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span>수업 생성</span>
            <button class="modal-close" onclick="closeLessonModal()">✕</button>
        </div>
        <div class="modal-body">
            <div id="lesson-modal-alert" class="alert alert-danger hidden"></div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">수업명 <span class="required">*</span></label>
                    <input type="text" id="ls-title" class="form-control" placeholder="예: 입문자 그룹 레슨">
                </div>
                <div class="form-group">
                    <label class="form-label">강사</label>
                    <input type="text" id="ls-instructor" class="form-control" placeholder="강사 이름">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">날짜 <span class="required">*</span></label>
                    <input type="date" id="ls-date" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">수업 유형 <span class="required">*</span></label>
                    <select id="ls-type" class="form-select">
                        <option value="GROUP">그룹</option>
                        <option value="PRIVATE">1:1 개인</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">시작 시간 <span class="required">*</span></label>
                    <input type="time" id="ls-start" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">종료 시간 <span class="required">*</span></label>
                    <input type="time" id="ls-end" class="form-control">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">대상 레벨</label>
                    <select id="ls-level" class="form-select">
                        <option value="">제한 없음</option>
                        <option value="BEGINNER">입문자</option>
                        <option value="INTERMEDIATE">중급자</option>
                        <option value="ADVANCED">고급자</option>
                        <option value="EXPERT">전문가</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">보드 타입</label>
                    <select id="ls-board" class="form-select">
                        <option value="">제한 없음</option>
                        <option value="SHORTBOARD">숏보드</option>
                        <option value="LONGBOARD">롱보드</option>
                        <option value="FUNBOARD">펀보드</option>
                        <option value="SUP">SUP</option>
                        <option value="BODYBOARD">바디보드</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">파도 크기</label>
                    <input type="text" id="ls-wave-size" class="form-control" placeholder="예: 1.5m">
                </div>
                <div class="form-group">
                    <label class="form-label">피리어드</label>
                    <input type="text" id="ls-wave-period" class="form-control" placeholder="예: 12s">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">바람</label>
                    <input type="text" id="ls-wind" class="form-control" placeholder="예: NW 10m/s">
                </div>
                <div class="form-group">
                    <label class="form-label">정원 <span class="required">*</span></label>
                    <input type="number" id="ls-capacity" class="form-control" placeholder="인원 수" min="1" value="8">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeLessonModal()">취소</button>
            <button class="btn btn-primary" id="btn-save-lesson">수업 생성</button>
        </div>
    </div>
</div>

<!-- ═══════════════════ 수업 상세 모달 ═══════════════════ -->
<div id="lesson-detail-overlay" class="modal-overlay hidden" onclick="closeLessonDetail()">
    <div class="modal-box modal-box-lg" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span id="lesson-detail-title">수업 상세</span>
            <button class="modal-close" onclick="closeLessonDetail()">✕</button>
        </div>
        <div class="modal-body" id="lesson-detail-body">
            <div class="text-center"><span class="spinner dark"></span></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeLessonDetail()">닫기</button>
        </div>
    </div>
</div>

<script src="/js/constants.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
