<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurfBook — 회원 마이페이지</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="app-header">
    <div class="logo"><span class="wave-icon">🌊</span> SurfBook</div>
    <div class="header-right">
        <span id="header-name" style="font-weight:600"></span>
        <span id="header-shop" style="opacity:0.75"></span>
        <button class="btn btn-ghost btn-sm" id="btn-refresh" style="color:white;opacity:0.9" title="새로고침">↺</button>
        <button class="btn btn-ghost btn-sm notif-bell-btn" id="btn-notif" style="color:white;opacity:0.9;position:relative" title="알림">
            🔔<span id="notif-badge" class="notif-badge hidden"></span>
        </button>
        <button class="btn btn-ghost btn-sm" id="btn-logout" style="color:white;opacity:0.9">로그아웃</button>
    </div>
</header>

<main class="page-container">

    <div id="loading-view" class="text-center mt-16"><span class="spinner dark"></span></div>

    <div id="content-view" class="hidden">

        <!-- 히어로 카드 -->
        <div class="member-hero">
          <div class="member-hero-wave"></div>
          <div class="member-hero-shop" id="hero-shop"></div>
          <div class="member-hero-name" id="hero-name">안녕하세요 👋</div>
          <div class="member-hero-sub" id="hero-sub">오늘도 좋은 라이딩 되세요.</div>
        </div>

        <!-- 회원권 카드 (클릭하면 수업예약 탭으로) -->
        <div id="membership-card" class="membership-card mt-16" style="cursor:pointer" onclick="switchMemberTab('reserve')" title="수업 예약하기"></div>

        <!-- 키핑권 카드 -->
        <div id="keeping-card" class="mt-8"></div>

        <!-- 탭 -->
        <div class="tabs mt-16">
            <button class="tab-btn active" data-tab="profile">내 정보</button>
            <button class="tab-btn" data-tab="mylessons">나의 수업</button>
            <button class="tab-btn" data-tab="reserve">수업 예약</button>
        </div>

        <!-- ── 내 정보 탭 ── -->
        <div id="tab-profile">
            <div class="card">
                <div class="card-header">👤 기본 정보</div>
                <div class="card-body" id="member-info-body"></div>
            </div>
        </div>

        <!-- ── 나의 수업 탭 ── -->
        <div id="tab-mylessons" class="hidden">
            <div id="my-lessons-list">
                <div class="text-center mt-16"><span class="spinner dark"></span></div>
            </div>
        </div>

        <!-- ── 수업 예약 탭 ── -->
        <div id="tab-reserve" class="hidden">

            <!-- 달력 -->
            <div class="card mt-0">
                <div class="card-body" style="padding:16px">
                    <div class="cal-nav">
                        <button class="btn btn-ghost btn-sm" id="cal-prev">‹</button>
                        <span id="cal-title" style="font-weight:700;font-size:15px"></span>
                        <button class="btn btn-ghost btn-sm" id="cal-next">›</button>
                    </div>
                    <div class="cal-grid" id="cal-grid"></div>
                </div>
            </div>

            <!-- 선택한 날짜의 수업 목록 -->
            <div id="day-lessons" class="mt-16"></div>

        </div>
    </div>

    <div id="error-view" class="hidden">
        <div class="alert alert-danger mt-16" id="error-msg"></div>
        <a href="/guest.html" class="btn btn-outline btn-block mt-8">로그인 페이지로</a>
    </div>

</main>

<!-- ─── Bottom Navigation ─── -->
<nav class="bnav">
    <button class="bnav-item active" id="bnav-home" onclick="switchBnav('home')">
        <span class="icn">⌂</span><span>홈</span>
    </button>
    <button class="bnav-item" id="bnav-book" onclick="switchBnav('book')">
        <span class="icn">☷</span><span>예약</span>
    </button>
    <button class="bnav-item" id="bnav-mine" onclick="switchBnav('mine')">
        <span class="icn">✓</span><span>내 수업</span>
    </button>
    <button class="bnav-item" id="bnav-me" onclick="switchBnav('me')">
        <span class="icn">◉</span><span>프로필</span>
    </button>
</nav>

<!-- ═══════════════════ 알림 패널 ═══════════════════ -->
<div id="notif-overlay" class="notif-overlay hidden" onclick="closeNotifPanel()"></div>
<div id="notif-panel" class="notif-panel hidden">
    <div class="notif-panel-header">
        <span>알림</span>
        <button class="btn btn-ghost btn-sm" id="notif-read-all" style="font-size:12px;color:var(--primary)">모두 읽음</button>
    </div>
    <div id="notif-list" class="notif-list">
        <div class="text-center mt-16"><span class="spinner dark"></span></div>
    </div>
</div>

<!-- ═══════════════════ D-7 만료 경고 모달 ═══════════════════ -->
<div id="expiry-modal-overlay" class="expiry-modal-overlay hidden" onclick="closeExpiryModal()">
    <div class="expiry-modal" onclick="event.stopPropagation()">
        <div style="width:56px;height:56px;border-radius:28px;background:#FFE3E3;display:grid;place-items:center;font-size:26px;margin:0 auto 12px">⏳</div>
        <h2 id="expiry-modal-title" style="text-align:center;font-size:17px;margin:0 0 6px">회원권이 곧 만료돼요</h2>
        <p id="expiry-modal-desc" style="font-size:13px;color:var(--fg-neutral-tertiary);line-height:1.6;text-align:center;margin:0 0 14px"></p>
        <div class="expiry-info-box" id="expiry-modal-info"></div>
        <button class="btn btn-primary btn-block mt-16" onclick="closeExpiryModal()">확인했습니다</button>
        <button class="btn btn-outline btn-block mt-8" style="font-size:13px" onclick="closeExpiryModal()">나중에</button>
    </div>
</div>

<script src="/js/constants.js"></script>
<script src="/js/member.js"></script>
</body>
</html>
