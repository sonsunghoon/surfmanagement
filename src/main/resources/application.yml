server:
  port: ${PORT:8084}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/surfshopdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:0119}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

surfshop:
  admin:
    token-expiry-hours: 24
